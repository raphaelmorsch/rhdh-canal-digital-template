apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.componentId }}
  namespace: ${{ values.argoNamespace }}
spec:
  project: ${{ values.argoProject }}
  source:
    repoURL: ${{ values.repoUrl }}
    targetRevision: main
    path: ./components/${{ values.componentId }}/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true