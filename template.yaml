apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-existing-quarkus-openshift-v3
  title: Onboard Existing Quarkus App to OpenShift
  description: Cria um repositório GitOps/pipeline, cria Application no ArgoCD e registra uma aplicação Quarkus existente no Developer Hub.
  tags:
    - quarkus
    - openshift
    - gitops
    - golden-template

spec:
  owner: platform-team
  type: service

  parameters:
    - title: Dados da aplicação existente
      required:
        - componentId
        - owner
        - sourceRepoUrl
        - namespace
      properties:
        componentId:
          title: Nome da aplicação
          type: string
          default: canal-digital-quarkus
          ui:field: EntityNamePicker
        owner:
          title: Dono da aplicação
          type: string
          default: group:default/developers
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
              - User
        sourceRepoUrl:
          title: Repositório de código fonte existente
          type: string
          default: https://github.com/raphaelmorsch/canal-digital-quarkus.git
        sourceBranch:
          title: Branch do código fonte
          type: string
          default: main
        namespace:
          title: Namespace de destino
          type: string
          default: canal-digital-dev
        imageStreamName:
          title: Nome do ImageStream/BuildConfig
          type: string
          default: canal-digital-quarkus-git
        routeEnabled:
          title: Criar rota pública via Knative Route
          type: boolean
          default: true

    - title: Repositório GitOps a ser criado
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Onde criar o repositório GitOps
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Renderizar artefatos de plataforma
      action: fetch:template
      input:
        url: https://github.com/raphaelmorsch/rhdh-canal-digital-template/tree/main/skeleton
        values:
          componentId: ${{ parameters.componentId }}
          owner: ${{ parameters.owner }}
          sourceRepoUrl: ${{ parameters.sourceRepoUrl }}
          sourceBranch: ${{ parameters.sourceBranch }}
          namespace: ${{ parameters.namespace }}
          imageStreamName: ${{ parameters.imageStreamName }}
          routeEnabled: ${{ parameters.routeEnabled }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}
          repoUrl: https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}.git
          argoNamespace: tssc-gitops
          argoProject: default
          argoPath: ./app-of-apps

    - id: publish
      name: Publicar repositório GitOps
      action: publish:github
      input:
        description: GitOps onboarding para ${{ parameters.componentId }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: public

    - id: create-argocd-resources
      name: Criar recursos no ArgoCD
      action: argocd:create-resources
      input:
        appName: ${{ parameters.componentId }}-app-of-apps
        argoInstance: default
        namespace: tssc-gitops
        repoUrl: https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}.git
        path: ./app-of-apps

    - id: start-pipeline
      name: Disparar pipeline inicial
      action: kubernetes:apply
      input:
        namespaced: true
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            name: ${{ parameters.componentId }}-initial-run
          spec:
            pipelineRef:
              name: ${{ parameters.componentId }}
            workspaces:
              - name: workspace
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi

    - id: register
      name: Registrar no catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório GitOps criado
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Aplicação ArgoCD
        url: ${{ steps.create-argocd-resources.output.appUrl }}
      - title: Componente no catálogo
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}